<div class="auth-container">
  <div class="film-bg">
    <span class="film-icon clapper">🎬</span>
    <span class="film-icon film">🎞️</span>
    <span class="film-icon popcorn">🍿</span>
    <span class="film-icon ticket">🎟️</span>
    <span class="film-icon star">⭐</span>
    <span class="film-icon play">▶️</span>
  </div>
  <mat-card>
    <h2 class="auth-title">🎬 Créer un compte</h2>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Nom d'utilisateur</mat-label>
        <input matInput formControlName="username" placeholder="JohnDoe" />
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="ton@email.com" />
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input matInput formControlName="password" [type]="showPassword() ? 'text' : 'password'" />
        <button mat-icon-button matSuffix type="button" (click)="showPassword.set(!showPassword())">
          <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button
        mat-raised-button
        color="primary"
        class="auth-btn"
        type="submit"
        [disabled]="loading()"
      >
        @if (loading()) {
          <mat-spinner diameter="24" />
        } @else {
          S'inscrire
        }
      </button>
    </form>
    <p class="auth-link">Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </mat-card>
</div>
