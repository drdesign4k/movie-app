<mat-card class="movie-card" (click)="goToDetail()">
  <div class="poster-wrapper">
    @if (movie().Poster !== 'N/A') {
      <img [src]="movie().Poster" [alt]="movie().Title" class="poster" />
    } @else {
      <div class="no-poster">
        <mat-icon>movie</mat-icon>
      </div>
    }

    <div class="overlay">
      <button
        mat-fab
        color="primary"
        class="details-btn"
        (click)="goToDetail(); $event.stopPropagation()"
      >
        <mat-icon>play_arrow</mat-icon>
      </button>
    </div>

    <span class="type-chip">
      {{ movie().Type }}
    </span>
  </div>

  <mat-card-content class="content">
    <h3 class="title">{{ movie().Title }}</h3>

    <div class="meta">
      <span class="year">
        <mat-icon>calendar_today</mat-icon>
        {{ movie().Year }}
      </span>

      @if (authService.isLoggedIn()) {
        <button
          mat-icon-button
          class="favorite-btn"
          [color]="favoritesService.isFavorite(movie().imdbID) ? 'warn' : ''"
          (click)="toggleFav(); $event.stopPropagation()"
        >
          <mat-icon>
            {{ favoritesService.isFavorite(movie().imdbID) ? 'favorite' : 'favorite_border' }}
          </mat-icon>
        </button>
      }
    </div>
  </mat-card-content>
</mat-card>
