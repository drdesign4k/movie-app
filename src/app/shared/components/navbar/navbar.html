<mat-toolbar class="streaming-header" [class.scrolled]="scrolled">

  <!-- LEFT: LOGO -->
  <a class="logo-area" routerLink="/">
    <img src="/cinemap.png" alt="CineMap" class="logo" />
  </a>

  <!-- CENTER NAV -->
  <nav class="nav-links desktop-only">

    <a routerLink="/" routerLinkActive="active-link">
      Accueil
    </a>

    <a routerLink="/search" routerLinkActive="active-link">
      Films
    </a>

    <a routerLink="/series" routerLinkActive="active-link">
      Séries
    </a>

    <a routerLink="/history" routerLinkActive="active-link">
      Historique
    </a>

  </nav>

  <span class="spacer"></span>

  <!-- SEARCH BAR (desktop only) -->
  <div class="search-box desktop-only">
    <mat-icon>search</mat-icon>
    <input placeholder="Rechercher un film, une série..." />
  </div>

  <!-- USER AREA -->
  <div class="user-area">

    @if (authService.isLoggedIn()) {

      <!-- FAVORITES -->
      <button class="icon-btn" routerLink="/favorites">
        <mat-icon
          [matBadge]="favoritesService.totalFavorites()"
          [matBadgeHidden]="favoritesService.totalFavorites() === 0"
          matBadgeColor="warn">
          favorite
        </mat-icon>
      </button>

      <!-- PROFILE MENU -->
      <button mat-icon-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" panelClass="user-menu">

        <div class="user-info">
          <strong>{{ authService.username() }}</strong>
        </div>

        <button mat-menu-item routerLink="/profile">
          Profil
        </button>

        <button mat-menu-item routerLink="/settings">
          Paramètres
        </button>

        <button mat-menu-item (click)="authService.logout()">
          Déconnexion
        </button>

      </mat-menu>

    } @else {

      <a class="login-btn" routerLink="/login">
        S’identifier
      </a>

    }

  </div>

  <!-- MOBILE MENU -->
  <button mat-icon-button class="mobile-only" [matMenuTriggerFor]="mobileMenu">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-menu #mobileMenu="matMenu" panelClass="mobile-menu">

    <button mat-menu-item routerLink="/search">Accueil</button>
    <button mat-menu-item routerLink="/movies">Films</button>
    <button mat-menu-item routerLink="/series">Séries</button>
    <button mat-menu-item routerLink="/history">Historique</button>

    <button mat-menu-item routerLink="/favorites">
      Favoris
    </button>

    @if (authService.isLoggedIn()) {
      <button mat-menu-item (click)="authService.logout()">
        Déconnexion
      </button>
    } @else {
      <button mat-menu-item routerLink="/login">
        Connexion
      </button>
    }

  </mat-menu>

</mat-toolbar>
