<mat-toolbar class="app-toolbar" [class.scrolled]="scrolled">
  <a class="brand" routerLink="/">
    <img src="/cinemap.png" alt="CineMap Logo" class="logo" />
  </a>

  <span class="spacer"></span>

  <!-- DESKTOP -->
  <div class="nav-links desktop-only">
    <a mat-button routerLink="/" routerLinkActive="active">
      <mat-icon>search</mat-icon>
      Recherche
    </a>

    @if (authService.isLoggedIn()) {
      <a mat-button routerLink="/favorites">
        <mat-icon aria-hidden="false"
                  [matBadge]="favoritesService.totalFavorites()"
                  [matBadgeHidden]="favoritesService.totalFavorites() === 0"
                  matBadgeColor="accent">
          favorite
        </mat-icon>
        Favoris
      </a>
      <a mat-button routerLink="/history">
        <mat-icon>history</mat-icon>
        Historique
      </a>
      <button mat-button (click)="authService.logout()">
        <mat-icon>logout</mat-icon> {{ authService.username() }}
      </button>
    }@else {
      <a mat-button routerLink="/login" class="nav-item">
        <mat-icon>login</mat-icon>
        Connexion
      </a>
    }
  </div>

  <!-- MOBILE -->
  <button mat-icon-button [matMenuTriggerFor]="menu" class="mobile-only">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-menu #menu="matMenu" panelClass="mobile-menu-panel">
    <a mat-button routerLink="/search" routerLinkActive="active">
      <mat-icon>search</mat-icon> Recherche
    </a>

    @if (authService.isLoggedIn()) {
      <a mat-button routerLink="/favorites">
        <mat-icon aria-hidden="false"
                  [matBadge]="favoritesService.totalFavorites()"
                  [matBadgeHidden]="favoritesService.totalFavorites() === 0"
                  matBadgeColor="accent">
          favorite
        </mat-icon>
        Favoris
      </a>
      <a mat-button routerLink="/history">
        <mat-icon>history</mat-icon>
        Historique
      </a>
      <button mat-button (click)="authService.logout()">
        <mat-icon>logout</mat-icon> {{ authService.username() }}
      </button>
    }@else {
      <button mat-menu-item routerLink="/login">
        <mat-icon>login</mat-icon>
        Connexion
      </button>
    }
  </mat-menu>
</mat-toolbar>
